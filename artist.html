<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artist Profile | Play It Twice Records</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: #0b0b0b;
      color: #f5f5f5;
      padding: 24px;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
    }

    a { color: inherit; text-decoration: none; }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }

    .title-group h1 {
      font-size: clamp(36px, 5vw, 60px);
      margin: 0 0 8px;
    }

    .title-group p {
      margin: 0;
      color: #bdbdbd;
      max-width: 680px;
    }

    .meta {
      display: grid;
      gap: 10px;
      align-items: start;
    }

    .button {
      display: inline-block;
      padding: 14px 20px;
      border-radius: 999px;
      border: 0;
      background: #f5f5f5;
      color: #0b0b0b;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
    }

    .section {
      background: #151515;
      border: 1px solid #232323;
      border-radius: 24px;
      padding: 28px;
    }

    .section h2 {
      margin-top: 0;
      font-size: 24px;
    }

    .track-list {
      display: grid;
      gap: 18px;
      margin-top: 20px;
    }

    .track-card {
      padding: 18px;
      border: 1px solid #232323;
      border-radius: 18px;
      background: #101010;
    }

    .track-card strong {
      display: block;
      margin-bottom: 6px;
      font-size: 18px;
    }

    .track-card span {
      color: #bdbdbd;
      display: block;
    }

    .track-card a {
      margin-top: 14px;
      display: inline-block;
      color: #0b0b0b;
      background: #b6ff4a;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 700;
    }

    .message {
      margin-top: 22px;
      color: #ff7373;
      font-size: 14px;
    }

    @media (max-width: 760px) {
      .header { flex-direction: column; }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="header">
      <div class="title-group">
        <h1 id="artistName">Artist Profile</h1>
        <p id="artistBio">Loading artist profile...</p>
      </div>

      <div class="meta">
        <a id="backLink" class="button" href="/">Back to home</a>
      </div>
    </div>

    <section class="section">
      <h2>Socials</h2>
      <p id="socials">Loading…</p>
    </section>

    <section class="section">
      <h2>Shared Tracks</h2>
      <div id="trackList" class="track-list"></div>
      <p id="emptyMessage" class="message"></p>
    </section>
  </div>

  <script>
    const supabaseUrl = "https://rpfoydkxloozkirwgjcm.supabase.co";
    const supabaseAnonKey = "sb_publishable_DhYH1BWEuY95SoP2TUUN4g_xj_BWcy_";

    const client = supabase.createClient(supabaseUrl, supabaseAnonKey);
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug");

    const artistNameEl = document.getElementById("artistName");
    const artistBioEl = document.getElementById("artistBio");
    const socialsEl = document.getElementById("socials");
    const trackListEl = document.getElementById("trackList");
    const emptyMessageEl = document.getElementById("emptyMessage");

    if (!slug) {
      artistNameEl.textContent = "Artist not found";
      artistBioEl.textContent = "No artist slug was provided.";
      socialsEl.textContent = "";
      emptyMessageEl.textContent = "Use a valid artist profile link.";
    }

    async function loadArtist() {
      if (!slug) return;

      const { data: profile, error: profileError } = await client
        .from("profiles")
        .select("*")
        .eq("slug", slug)
        .maybeSingle();

      if (profileError || !profile) {
        artistNameEl.textContent = "Artist not found";
        artistBioEl.textContent = "This profile does not exist.";
        socialsEl.textContent = "";
        emptyMessageEl.textContent = "Try another artist profile link.";
        console.error(profileError);
        return;
      }

      artistNameEl.textContent = profile.artist_name;
      artistBioEl.textContent = profile.bio || "No bio available yet.";

      const socials = [];
      if (profile.instagram_handle) socials.push(`Instagram: @${profile.instagram_handle}`);
      if (profile.tiktok_handle) socials.push(`TikTok: @${profile.tiktok_handle}`);
      if (profile.spotify_url) socials.push(`Spotify: ${profile.spotify_url}`);
      if (profile.soundcloud_url) socials.push(`SoundCloud: ${profile.soundcloud_url}`);

      socialsEl.textContent = socials.length ? socials.join(" • ") : "No socials listed.";

      const { data: tracks, error: tracksError } = await client
        .from("tracks")
        .select("*")
        .eq("user_id", profile.id);

      if (tracksError) {
        console.error(tracksError);
        emptyMessageEl.textContent = "Unable to load tracks at the moment.";
        return;
      }

      if (!tracks || tracks.length === 0) {
        emptyMessageEl.textContent = "No tracks have been shared yet.";
        return;
      }

      trackListEl.innerHTML = "";
      tracks.forEach((track) => {
        const card = document.createElement("div");
        card.className = "track-card";

        card.innerHTML = `
          <strong>${track.track_title}</strong>
          <span>${track.genre || "Genre not specified"}</span>
          <a href="/track-download.html?track_id=${track.id}">Request Download</a>
        `;

        trackListEl.appendChild(card);
      });
    }

    loadArtist();
  </script>
</body>
</html>
