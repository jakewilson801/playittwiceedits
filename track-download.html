<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Track | Play It Twice Records</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: #0b0b0b;
      color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: #151515;
      border: 1px solid #2a2a2a;
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
    }

    p {
      margin: 0 0 24px;
      color: #bdbdbd;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #0f0f0f;
      color: #fff;
      font-size: 16px;
      margin-bottom: 18px;
    }

    .button {
      width: 100%;
      display: inline-block;
      border: 0;
      border-radius: 999px;
      padding: 15px 18px;
      background: #f5f5f5;
      color: #0b0b0b;
      font-size: 16px;
      font-weight: 800;
      text-align: center;
      text-decoration: none;
      margin-top: 18px;
    }

    .error {
      margin-top: 16px;
      color: #ff7373;
      font-size: 14px;
    }

    .success {
      margin-top: 16px;
      color: #b6ff4a;
      font-size: 14px;
    }

    .meta-link {
      display: inline-block;
      margin-top: 20px;
      color: #9dffb0;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>Unlock the download</h1>
    <p id="trackInfo">Loading track details...</p>

    <form id="downloadForm">
      <div id="repostNotice" style="display:none; margin-bottom: 16px; color: #b6ff4a; font-size: 14px;"></div>

      <div id="emailWrapper">
        <label for="email">Your email *</label>
        <input id="email" type="email" placeholder="you@example.com" />
      </div>

      <div id="instagramWrapper">
        <label for="instagramHandle">Instagram Handle</label>
        <input id="instagramHandle" type="text" placeholder="@yourhandle" />
      </div>

      <div id="tiktokWrapper">
        <label for="tiktokHandle">TikTok Handle</label>
        <input id="tiktokHandle" type="text" placeholder="@yourhandle" />
      </div>

      <button id="primaryAction" type="submit">Get Download Link</button>
      <div id="message" class="error"></div>
      <button id="tryAgainButton" type="button" class="button" style="display:none; margin-top: 16px;">Try again</button>
    </form>

    <div id="confirmation" style="display:none; margin-top: 24px;"></div>
    <a class="meta-link" href="/">← Back to home</a>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://rpfoydkxloozkirwgjcm.supabase.co";
    const supabaseAnonKey = "sb_publishable_DhYH1BWEuY95SoP2TUUN4g_xj_BWcy_";
    const client = supabase.createClient(supabaseUrl, supabaseAnonKey);
    const soundcloudClientId = "KUCnjgzaLGQ27UcTymXuQvEQD8cBHV0I";
    const redirectUri = `${window.location.origin}/soundcloud-callback.html`;
    const soundcloudAuthUrl = "https://rpfoydkxloozkirwgjcm.supabase.co/functions/v1/soundcloud_auth";
    const soundcloudGateUrl = "https://rpfoydkxloozkirwgjcm.supabase.co/functions/v1/soundcloud_repost";
    const storageKey = "soundcloud_access_token";
    const codeVerifierStorageKey = "soundcloud_code_verifier";

    const urlParams = new URLSearchParams(window.location.search);
    const trackId = urlParams.get("track_id");

    const messageEl = document.getElementById("message");
    const trackInfoEl = document.getElementById("trackInfo");
    const form = document.getElementById("downloadForm");
    const repostNotice = document.getElementById("repostNotice");
    const emailWrapper = document.getElementById("emailWrapper");
    const instagramWrapper = document.getElementById("instagramWrapper");
    const tiktokWrapper = document.getElementById("tiktokWrapper");
    const primaryAction = document.getElementById("primaryAction");
    const tryAgainButton = document.getElementById("tryAgainButton");
    const confirmationEl = document.getElementById("confirmation");
    const emailInput = document.getElementById("email");
    let soundcloudAccessToken = sessionStorage.getItem(storageKey);
    let currentTrack = null;

    if (!trackId) {
      trackInfoEl.textContent = "Track not found.";
      form.style.display = "none";
    }

    async function generateCodeVerifier() {
      const array = new Uint8Array(96);
      crypto.getRandomValues(array);
      return btoa(String.fromCharCode(...array))
        .replace(/\+/g, "-")
        .replace(/\//g, "_")
        .replace(/=+$/, "");
    }

    async function generateCodeChallenge(verifier) {
      const data = new TextEncoder().encode(verifier);
      const digest = await crypto.subtle.digest("SHA-256", data);
      const bytes = new Uint8Array(digest);
      return btoa(String.fromCharCode(...bytes))
        .replace(/\+/g, "-")
        .replace(/\//g, "_")
        .replace(/=+$/, "");
    }

    async function getSoundCloudConnectUrl() {
      const verifier = await generateCodeVerifier();
      sessionStorage.setItem(codeVerifierStorageKey, verifier);
      const challenge = await generateCodeChallenge(verifier);
      const state = encodeURIComponent(btoa(JSON.stringify({ returnTo: window.location.href, code_verifier: verifier })));
      return `https://secure.soundcloud.com/authorize?client_id=${encodeURIComponent(soundcloudClientId)}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=code&code_challenge=${encodeURIComponent(challenge)}&code_challenge_method=S256&state=${state}`;
    }

    async function autoStartAuthIfNeeded(track) {
      if (track?.soundcloud_url && soundcloudAccessToken) {
        messageEl.className = "success";
        messageEl.textContent = "Verifying SoundCloud support...";
        const result = await verifySoundCloudGate(track);
        if (result.success) {
          showConfirmation(track);
        } else {
          showFailure(result.message || "Couldn't verify SoundCloud support. Try again.");
        }
      }
    }

    function setSupportActionText() {
      primaryAction.textContent = currentTrack?.soundcloud_url ? "Like + repost on SoundCloud" : "Get Download Link";
    }

    function renderGateMode(soundcloudRequired) {
      const artistText = currentTrack?.artist_name ? `${currentTrack.track_title} — ${currentTrack.artist_name}` : currentTrack?.track_title || "Loading track details...";
      trackInfoEl.textContent = artistText;
      confirmationEl.style.display = "none";
      tryAgainButton.style.display = "none";
      messageEl.textContent = "";

      if (soundcloudRequired) {
        repostNotice.textContent = "Support this release to unlock the download.";
        repostNotice.style.display = "block";
        emailWrapper.style.display = "none";
        instagramWrapper.style.display = "none";
        tiktokWrapper.style.display = "none";
        emailInput.required = false;
      } else {
        repostNotice.style.display = "none";
        emailWrapper.style.display = "block";
        instagramWrapper.style.display = "block";
        tiktokWrapper.style.display = "block";
        emailInput.required = true;
      }

      setSupportActionText();
    }

    async function fetchTrack() {
      const { data, error } = await client
        .from("tracks")
        .select("*")
        .eq("id", trackId)
        .maybeSingle();

      if (error || !data) {
        trackInfoEl.textContent = "Track not found.";
        form.style.display = "none";
        return null;
      }

      const { data: profile } = await client
        .from("profiles")
        .select("artist_name")
        .eq("id", data.user_id)
        .maybeSingle();

      currentTrack = { ...data, artist_name: profile?.artist_name || "Unknown artist" };
      renderGateMode(!!data.soundcloud_url);
      return currentTrack;
    }

    async function verifySoundCloudGate(track) {
      if (!soundcloudAccessToken) {
        return { success: false, message: "Please sign in with SoundCloud first." };
      }

      const response = await fetch(soundcloudGateUrl, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${supabaseAnonKey}`,
          "apikey": supabaseAnonKey
        },
        body: JSON.stringify({
          track_url: track.soundcloud_url,
          access_token: soundcloudAccessToken
        })
      });

      if (!response.ok) {
        const body = await response.json().catch(() => ({}));
        if (response.status === 401) {
          sessionStorage.removeItem(storageKey);
          soundcloudAccessToken = null;
          return { success: false, message: "SoundCloud session expired. Please sign in again." };
        }
        return { success: false, message: body.message || "Unable to verify SoundCloud repost and like." };
      }

      const result = await response.json();
      const success = result.reposted && result.liked;
      const message = success ? "" : "Please repost and like the SoundCloud track before downloading.";
      return { success, message };
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      messageEl.textContent = "";
      messageEl.className = "error";
      tryAgainButton.style.display = "none";

      const email = emailInput.value.trim();
      const instagramHandle = document.getElementById("instagramHandle").value.trim();
      const tiktokHandle = document.getElementById("tiktokHandle").value.trim();

      const track = await fetchTrack();
      if (!track) return;

      if (track.soundcloud_url) {
        if (!soundcloudAccessToken) {
          window.location.href = await getSoundCloudConnectUrl();
          return;
        }

        const result = await verifySoundCloudGate(track);
        if (!result.success) {
          showFailure(result.message || "Couldn't verify SoundCloud support. Try again.");
          return;
        }

        showConfirmation(track);
        return;
      }

      if (!email) {
        messageEl.textContent = "Please enter your email.";
        return;
      }

      const { error: saveError } = await client.from("downloads").insert({
        track_id: trackId,
        email,
        instagram_handle: instagramHandle,
        tiktok_handle: tiktokHandle
      });

      if (saveError) {
        messageEl.textContent = "Unable to register download. Try again later.";
        return;
      }

      const downloadUrl = buildDropboxDownloadUrl(track.dropbox_url);
      messageEl.className = "success";
      messageEl.textContent = "Download ready — click the button below.";
      const button = document.createElement("a");
      button.href = downloadUrl;
      button.className = "button";
      button.textContent = "Download Now";
      button.target = "_blank";
      form.after(button);
      form.remove();
    });

    fetchTrack().then((track) => {
      if (!track) return;
      renderGateMode(!!track.soundcloud_url);
      autoStartAuthIfNeeded(track);
    });

    tryAgainButton.addEventListener("click", () => {
      messageEl.textContent = "";
      messageEl.className = "";
      tryAgainButton.style.display = "none";
      renderGateMode(!!currentTrack?.soundcloud_url);
    });

    function showConfirmation(track) {
      form.style.display = "none";
      confirmationEl.style.display = "block";
      confirmationEl.innerHTML = `
        <p class="success">Thanks for supporting. Your download is ready.</p>
        <a href="${buildDropboxDownloadUrl(track.dropbox_url)}" class="button" target="_blank">Download</a>
      `;
    }

    function showFailure(message) {
      messageEl.className = "error";
      messageEl.textContent = message || "Couldn't verify SoundCloud support. Try again.";
      tryAgainButton.style.display = "block";
    }

    function buildDropboxDownloadUrl(dropboxUrl) {
      if (!dropboxUrl) return "";
      let url = dropboxUrl.replace(/&amp;/g, "&");
      if (url.includes("dl=0")) {
        return url.replace("dl=0", "dl=1");
      }
      if (url.includes("www.dropbox.com")) {
        return url.replace("www.dropbox.com", "dl.dropboxusercontent.com");
      }
      return url;
    }
  </script>
</body>
</html>
