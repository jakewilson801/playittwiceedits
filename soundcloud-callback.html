<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoundCloud Sign In</title>
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: Arial, Helvetica, sans-serif; background: #0b0b0b; color: #f5f5f5; }
    .card { width: 100%; max-width: 520px; background: #151515; border: 1px solid #2a2a2a; border-radius: 18px; padding: 32px; text-align: center; }
    p { margin: 16px 0; color: #bdbdbd; }
    .loading { color: #9dffb0; }
    .error { color: #ff7373; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Finishing SoundCloud sign in</h1>
    <p id="status" class="loading">Please wait...</p>
    <pre id="debug" style="margin-top:20px; text-align:left; white-space:pre-wrap; color:#ccc; font-size:13px;"></pre>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const debugEl = document.getElementById("debug");
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const state = params.get("state");
    const error = params.get("error");
    const codeVerifierStorageKey = "soundcloud_code_verifier";

    function decodeState(stateValue) {
      try {
        return JSON.parse(atob(decodeURIComponent(stateValue)));
      } catch {
        return {};
      }
    }

    const supabaseAnonKey = "sb_publishable_DhYH1BWEuY95SoP2TUUN4g_xj_BWcy_";

    function addReturnFlag(returnTo) {
      const url = new URL(returnTo || "/", window.location.origin);
      url.searchParams.delete("soundcloud_return");
      url.searchParams.set("soundcloud_return", "1");
      return url.toString();
    }

    async function finishSignIn(code, returnTo, stateData) {
      try {
        const redirectUri = window.location.origin + "/soundcloud-callback.html";
        let codeVerifier = sessionStorage.getItem(codeVerifierStorageKey);
        if (!codeVerifier && stateData?.code_verifier) {
          codeVerifier = stateData.code_verifier;
          sessionStorage.setItem(codeVerifierStorageKey, codeVerifier);
        }

        debugEl.textContent = `Debug:\ncode=${code}\nredirect_uri=${redirectUri}\ncode_verifier=${codeVerifier ? "present" : "missing"}\n`;

        if (!codeVerifier) {
          throw new Error("Missing PKCE code verifier. Please restart the SoundCloud sign-in flow.");
        }

        const response = await fetch("https://rpfoydkxloozkirwgjcm.supabase.co/functions/v1/soundcloud_auth", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${supabaseAnonKey}`,
            "apikey": supabaseAnonKey
          },
          body: JSON.stringify({ code, redirect_uri: redirectUri, code_verifier: codeVerifier })
        });

        const responseText = await response.text();
        let body;
        try {
          body = JSON.parse(responseText);
        } catch {
          body = { raw: responseText };
        }

        if (!response.ok) {
          debugEl.textContent += `\nResponse status: ${response.status}\n${JSON.stringify(body, null, 2)}`;
          throw new Error(body.message || "Unable to complete SoundCloud sign in.");
        }

        const data = body;
        if (!data.access_token) {
          debugEl.textContent += `\nMissing access token:\n${JSON.stringify(data, null, 2)}`;
          throw new Error("No access token returned from SoundCloud.");
        }

        sessionStorage.setItem("soundcloud_access_token", data.access_token);
        statusEl.textContent = "SoundCloud sign in successful. Redirecting...";
        const redirectTarget = addReturnFlag(returnTo || "/");
        setTimeout(() => window.location.href = redirectTarget, 750);
      } catch (err) {
        statusEl.className = "error";
        statusEl.textContent = err.message;
      }
    }

    if (error) {
      statusEl.className = "error";
      statusEl.textContent = "SoundCloud denied access or sign-in failed.";
    } else if (!code) {
      statusEl.className = "error";
      statusEl.textContent = "Missing SoundCloud authorization code.";
    } else {
      const decoded = state ? decodeState(state) : {};
      const returnTo = decoded.returnTo || "/";
      finishSignIn(code, returnTo, decoded);
    }
  </script>
</body>
</html>
