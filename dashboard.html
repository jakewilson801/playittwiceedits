<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Play It Twice Records</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0b0b0b;
      color: #f5f5f5;
      line-height: 1.5;
    }

    a { color: inherit; text-decoration: none; }

    .page { min-height: 100vh; padding: 24px; }

    .nav {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 0;
    }

    .logo {
      font-weight: 800;
      letter-spacing: -0.04em;
      font-size: 22px;
    }

    .nav button {
      background: transparent;
      color: #f5f5f5;
      border: 1px solid #444;
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
    }

    .hero {
      max-width: 1100px;
      margin: 0 auto;
      padding: 90px 0 70px;
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 48px;
      align-items: start;
    }

    .eyebrow {
      color: #b6ff4a;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 700;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(48px, 8vw, 92px);
      line-height: 0.92;
      letter-spacing: -0.07em;
      margin: 0 0 24px;
    }

    p {
      color: #cfcfcf;
      font-size: 18px;
    }

    .card {
      border: 1px solid #242424;
      background: linear-gradient(180deg, #171717, #101010);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 20px 80px rgba(0,0,0,0.35);
    }

    .card h2 {
      margin-top: 0;
      font-size: 28px;
      letter-spacing: -0.04em;
    }

    .button {
      display: inline-block;
      padding: 14px 20px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 15px;
      border: 0;
      cursor: pointer;
      background: #f5f5f5;
      color: #0b0b0b;
      margin-top: 12px;
    }

    .track-list-container {
      margin: 24px 0 0;
    }

    .track-list {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .track-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 1px solid #2b2b2b;
      border-radius: 16px;
      background: #111;
    }

    .track-item button {
      border: 1px solid #444;
      background: transparent;
      color: #f5f5f5;
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
    }

    .track-item button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .track-item-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .message {
      min-height: 24px;
      font-size: 14px;
      color: #aaa;
    }

    .success { color: #b6ff4a; }
    .error { color: #ff6b6b; }

    footer {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 0 20px;
      color: #777;
      font-size: 14px;
      border-top: 1px solid #202020;
    }

    @media (max-width: 800px) {
      .hero { grid-template-columns: 1fr; padding: 60px 0; }
      .nav { align-items: flex-start; gap: 16px; flex-direction: column; }
    }
  </style>
</head>

<body>
  <div class="page">
    <nav class="nav">
      <div class="logo">Play It Twice Records</div>
      <button id="logout-button">Log Out</button>
    </nav>

    <main class="hero">
      <section>
        <div class="eyebrow">Dashboard</div>
        <h1>You're all set.</h1>
        <p id="dashboard-copy">
          Loading your artist profile...
        </p>
      </section>

      <aside class="card">
        <h2>Your Account</h2>
        <p id="email">Loading...</p>
        <p id="artistName"></p>
        <div id="trackSummary" class="message"></div>
        <div id="trackListContainer" class="track-list-container">
          <h3>Your uploaded tracks</h3>
          <div id="trackList" class="track-list">
            Loading tracks...
          </div>
        </div>
        <div id="message" class="message"></div>

        <a id="profile-button" class="button" href="/setup-profile.html">
          Loading...
        </a>
        <a id="submit-track-button" class="button" href="/submit-track.html">
          Upload an Edit
        </a>
      </aside>
    </main>

    <footer>
      © 2026 Play It Twice Records. Discover. Share. Repeat.
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://rpfoydkxloozkirwgjcm.supabase.co";
    const supabaseAnonKey = "sb_publishable_DhYH1BWEuY95SoP2TUUN4g_xj_BWcy_";

    const supabaseClient = window.supabase.createClient(
      supabaseUrl,
      supabaseAnonKey
    );

    const emailEl = document.getElementById("email");
    const messageEl = document.getElementById("message");
    const logoutButton = document.getElementById("logout-button");
    const profileButton = document.getElementById("profile-button");
    const dashboardCopy = document.getElementById("dashboard-copy");
    const trackSummary = document.getElementById("trackSummary");
    const trackList = document.getElementById("trackList");

    function renderTrackList(tracks) {
      if (!trackList) return;
      trackList.innerHTML = "";

      if (!tracks || tracks.length === 0) {
        trackList.textContent = "No tracks uploaded yet.";
        return;
      }

      tracks.forEach((track) => {
        const trackLink = track.id
          ? `https://playittwicerecs.com/track-download.html?track_id=${track.id}`
          : "";
        const item = document.createElement("div");
        item.className = "track-item";

        const title = document.createElement("a");
        title.className = "track-item-title";
        title.href = trackLink || "#";
        title.textContent = track.track_title || "Untitled track";
        if (trackLink) {
          title.target = "_blank";
          title.rel = "noreferrer noopener";
        }

        const button = document.createElement("button");
        button.type = "button";
        button.textContent = trackLink ? "Copy Link" : "No Link";
        button.disabled = !trackLink;

        if (trackLink) {
          button.addEventListener("click", async () => {
            try {
              await navigator.clipboard.writeText(trackLink);
              button.textContent = "Copied!";
              setTimeout(() => {
                button.textContent = "Copy Link";
              }, 1300);
            } catch (copyError) {
              console.error(copyError);
              button.textContent = "Copy failed";
              setTimeout(() => {
                button.textContent = "Copy Link";
              }, 1300);
            }
          });
        }

        item.append(title, button);
        trackList.append(item);
      });
    }

    async function loadDashboard() {
      const {
        data: { user },
        error: userError
      } = await supabaseClient.auth.getUser();

      if (userError || !user) {
        window.location.href = "/";
        return;
      }

      if (emailEl) {
        emailEl.textContent = user.email;
      }

      const { data: profile, error: profileError } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", user.id)
        .maybeSingle();

      if (profileError) {
        console.error(profileError);

        if (messageEl) {
          messageEl.className = "message error";
          messageEl.textContent = "Could not load your artist profile.";
        }

        if (profileButton) {
          profileButton.textContent = "Try Setup Again";
          profileButton.href = "/setup-profile.html";
        }

        return;
      }

      const { data: tracks, error: tracksError } = await supabaseClient
        .from("tracks")
        .select("id, track_title")
        .eq("user_id", user.id);

      if (tracksError) {
        console.error(tracksError);
      }

      if (trackSummary) {
        const count = tracks ? tracks.length : 0;
        trackSummary.textContent = count
          ? `You’ve submitted ${count} track${count === 1 ? "" : "s"}.`
          : "You haven’t submitted any tracks yet.";
      }

      renderTrackList(tracks);

      if (!profile) {
        if (messageEl) {
          messageEl.className = "message";
          messageEl.textContent = "Finish setting up your artist profile.";
        }

        if (profileButton) {
          profileButton.textContent = "Set Up Artist Profile";
          profileButton.href = "/setup-profile.html";
        }

        if (dashboardCopy) {
          dashboardCopy.textContent =
            "Your account is active. Next we’ll set up your artist profile and let you upload edits for Souncloud likes, reposts etc";
        }

        return;
      }

      if (messageEl) {
        messageEl.className = "message success";
        messageEl.textContent = `Profile ready: ${profile.artist_name}`;
      }

      if (profileButton) {
        profileButton.textContent = "View Artist Profile";
        profileButton.href = `/artist.html?slug=${profile.slug}`;
      }

      if (dashboardCopy) {
        dashboardCopy.textContent =
          "Your profile is live. Start sharing edits, collecting reposts, and growing your SoundCloud audience.";
      }
    }

    if (logoutButton) {
      logoutButton.addEventListener("click", async () => {
        await supabaseClient.auth.signOut();
        window.location.href = "/";
      });
    }

    loadDashboard();
  </script>
</body>
</html>
